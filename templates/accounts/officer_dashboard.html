{% extends "base.html" %}{% block content %}
<h2 class="text-primary mb-4">Officer — Account Approvals</h2>
<h5>Pending Approvals</h5>
<table class="table table-bordered">
  <thead class="table-dark"><tr><th>Username</th><th>Email</th><th>Action</th></tr></thead>
  <tbody>{% for a in pending %}
  <tr><td>{{ a.user.username }}</td><td>{{ a.user.email }}</td>
    <td><form method="POST">{% csrf_token %}
      <input type="hidden" name="user_id" value="{{ a.user.id }}">
      <button name="action" value="approve" class="btn btn-success btn-sm">Approve</button>
      <button name="action" value="reject"  class="btn btn-danger btn-sm ms-1">Reject</button>
    </form></td></tr>
  {% empty %}<tr><td colspan="3">No pending approvals.</td></tr>{% endfor %}
  </tbody>
</table>{% endblock %}
