{% extends "base.html" %}{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
<h2 class="mb-4 text-primary">Create Account</h2>
<form method="POST">{% csrf_token %}
  <div class="mb-3"><label class="form-label">Username</label>
  <input type="text" name="username" class="form-control" required></div>
  <div class="mb-3"><label class="form-label">Email</label>
  <input type="email" name="email" class="form-control" required></div>
  <div class="mb-3"><label class="form-label">Password</label>
  <input type="password" name="password" class="form-control" required></div>
  <button type="submit" class="btn btn-primary w-100">Register</button>
</form>
<p class="mt-3 text-center">Already registered? <a href="{% url 'login' %}">Login</a></p>
</div></div>{% endblock %}
