{% extends "base.html" %}{% block content %}
<h2 class="mb-4">Crime Prediction Log & Charts</h2>
<div class="row mb-4"><div class="col-md-8">
  <canvas id="crimeLogChart"></canvas>
</div></div>
<h5>Recent Predictions</h5>
<table class="table table-striped table-bordered">
  <thead class="table-dark"><tr><th>User</th><th>Result</th><th>Time</th></tr></thead>
  <tbody>{% for log in recent %}
  <tr><td>{{ log.user.username }}</td><td>{{ log.result }}</td>
    <td>{{ log.timestamp|date:"d M Y H:i" }}</td></tr>
  {% endfor %}</tbody>
</table>
<script>
  new Chart(document.getElementById('crimeLogChart'), {
    type: 'bar',
    data: { labels: {{ labels|safe }},
      datasets: [{ label: 'Predictions by Crime Type',
        data: {{ counts|safe }}, backgroundColor: '#42a5f5' }] }
  });
</script>{% endblock %}
