{% extends "base.html" %}
{% block title %}Error — Crime AI{% endblock %}
{% block extra_css %}
<style>
  .error-wrap { min-height:calc(100vh - 130px); display:flex; align-items:center; justify-content:center; }
  .error-box  { width:100%; max-width:520px; text-align:center; }
  .error-code { font-family:'Share Tech Mono',monospace; font-size:5rem; color:var(--red); text-shadow:0 0 30px rgba(255,7,58,.6); line-height:1; }
  .error-title { font-family:'Share Tech Mono',monospace; font-size:1.3rem; color:var(--text); letter-spacing:3px; margin:.75rem 0 .4rem; }
  .error-sub   { font-family:'Share Tech Mono',monospace; font-size:.72rem; color:var(--muted); letter-spacing:1.5px; margin-bottom:2rem; }
  .glitch { animation: glitch 2.5s infinite; }
  @keyframes glitch {
    0%,100% { text-shadow:0 0 30px rgba(255,7,58,.6); transform:none; }
    5%  { text-shadow:-3px 0 var(--cyan), 3px 0 var(--red); transform:skewX(-2deg); }
    10% { text-shadow:3px 0 var(--cyan), -3px 0 var(--red); transform:skewX(2deg); }
    15% { text-shadow:none; transform:none; }
  }
</style>
{% endblock %}
{% block content %}
<div class="error-wrap">
  <div class="error-box">
    <div class="c-card c-card-red">
      <div class="error-code glitch">⚠</div>
      <div class="error-title">SYSTEM ERROR</div>
      <div class="error-sub">AN UNEXPECTED ERROR HAS OCCURRED</div>
      <div class="a-danger mb-4">
        <i class="fas fa-exclamation-triangle me-2"></i>
        {{ error_message|default:"An unexpected error occurred. Please try again." }}
      </div>
      <a href="/" class="btn-c btn-c-red text-decoration-none d-inline-block">
        <i class="fas fa-home me-2"></i>RETURN TO HOME
      </a>
    </div>
  </div>
</div>
{% endblock %}
