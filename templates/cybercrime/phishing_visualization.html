{% extends "base.html" %}
{% block title %}Cyber Charts — Crime AI{% endblock %}
{% block content %}
<div class="page-hdr">
  <h2><i class="fas fa-chart-pie me-2"></i>CYBER DETECTION ANALYTICS</h2>
  <p>PHISHING DETECTION DISTRIBUTION</p>
</div>

<div class="row g-4">
  <div class="col-lg-5">
    <div class="c-card c-card-orange">
      <h5 class="mono text-noran mb-3" style="letter-spacing:2px;font-size:.88rem;"><i class="fas fa-chart-pie me-2"></i>THREAT SPLIT</h5>
      <canvas id="cyberPie" height="300"></canvas>
    </div>
  </div>
  <div class="col-lg-7">
    <div class="c-card">
      <h5 class="mono text-cyan mb-3" style="letter-spacing:2px;font-size:.88rem;"><i class="fas fa-chart-bar me-2"></i>DETECTION COUNT</h5>
      <canvas id="cyberBar" height="300"></canvas>
    </div>
  </div>
</div>

<div class="mt-3">
  <a href="{% url 'phishing_home' %}" class="btn-c btn-c-orange text-decoration-none me-2"><i class="fas fa-bug me-2"></i>NEW ANALYSIS</a>
  <a href="{% url 'charts_crime' %}"  class="btn-c text-decoration-none"><i class="fas fa-chart-bar me-2"></i>CRIME CHARTS</a>
</div>
{% endblock %}
{% block extra_js %}
<script>
const labels = {{ labels|safe }};
const counts = {{ counts|safe }};
Chart.defaults.color = '#3a6070';
Chart.defaults.borderColor = 'rgba(0,245,255,0.08)';

new Chart(document.getElementById('cyberPie'), {
  type: 'pie',
  data: { labels, datasets: [{ data: counts, backgroundColor: ['#ff073a','#39ff14'], borderColor: '#050f1c', borderWidth: 2 }] },
  options: { responsive: true, plugins: { legend: { labels: { color: '#cce8f0', font: { family: 'Share Tech Mono' } } } } }
});

new Chart(document.getElementById('cyberBar'), {
  type: 'bar',
  data: { labels, datasets: [{ label: 'Detection Count', data: counts, backgroundColor: ['#ff073a','#39ff14'], borderRadius: 3 }] },
  options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(0,245,255,0.05)' } }, y: { grid: { color: 'rgba(0,245,255,0.05)' }, ticks: { color: '#3a6070' } } } }
});
</script>
{% endblock %}
