{% extends "base.html" %}
{% block title %}Cyber Charts{% endblock %}
{% block content %}

<h2 class="text-warning mb-4">Phishing Detection Distribution</h2>

<div class="row">
  <div class="col-md-5">
    <div class="card p-3">
      <canvas id="cyberPie"></canvas>
    </div>
  </div>
  <div class="col-md-5">
    <div class="card p-3">
      <canvas id="cyberBar"></canvas>
    </div>
  </div>
</div>

<script>
  const labels = {{ labels|safe }};
  const counts = {{ counts|safe }};

  new Chart(document.getElementById('cyberPie'), {
    type: 'pie',
    data: {
      labels: labels,
      datasets: [{
        data: counts,
        backgroundColor: ['#ef5350', '#66bb6a'],
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'bottom' } }
    }
  });

  new Chart(document.getElementById('cyberBar'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Detection Count',
        data: counts,
        backgroundColor: ['#ef5350', '#66bb6a'],
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });
</script>

{% endblock %}
