{% extends "base.html" %}{% block title %}Cybercrime Detection{% endblock %}
{% block content %}
<h2 class="text-warning mb-4">Cybercrime / Phishing Detection</h2>
<div class="row"><div class="col-md-6">
<form method="POST" action="{% url 'phishing_result' %}">{% csrf_token %}
  <div class="mb-3"><label class="form-label">URL Length (characters)</label>
  <input type="number" name="url_length" class="form-control" min="1" required></div>
  <div class="mb-3 form-check">
  <input type="checkbox" name="has_ip" value="1" class="form-check-input" id="hasIp">
  <label class="form-check-label" for="hasIp">URL Contains an IP Address</label></div>
  <div class="mb-3"><label class="form-label">Suspicious Keyword Count</label>
  <input type="number" name="suspicious_keywords" class="form-control" min="0" required></div>
  <div class="mb-3 form-check">
  <input type="checkbox" name="has_https" value="1" class="form-check-input" id="hasHttps" checked>
  <label class="form-check-label" for="hasHttps">URL Uses HTTPS</label></div>
  <button type="submit" class="btn btn-warning px-5">Detect Threat</button>
</form></div></div>{% endblock %}
