{% extends "base.html" %}
{% block title %}Cybercrime Detection{% endblock %}
{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-md-7">
    <div class="card p-4">
      <h2 class="text-warning mb-2">🔍 Cybercrime / Phishing Detection</h2>
      <p class="text-muted mb-4">Enter any URL below to check if it is a phishing threat or legitimate.</p>
      <form method="POST" action="{% url 'phishing_result' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-bold">URL to Analyse</label>
          <input type="url" name="url" class="form-control form-control-lg"
                 placeholder="https://example.com" required>
          <div class="form-text">Example: https://google.com or http://free-prize-click.com</div>
        </div>
        <button type="submit" class="btn btn-warning px-5 fw-bold">
          Detect Threat
        </button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
